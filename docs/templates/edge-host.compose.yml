name: rend-edge-host

# Set REND_EDGE_IMAGE to the immutable digest ref from the release manifest, for
# example registry.example.com/rend/rend-edge@sha256:...
services:
  rend-edge:
    image: ${REND_EDGE_IMAGE:?set REND_EDGE_IMAGE}
    restart: unless-stopped
    env_file:
      - /etc/rend/rend-edge.env
    ports:
      # Keep direct :4100 private by default. Public playback should be exposed
      # through docs/templates/edge-host.Caddyfile.
      - "${REND_EDGE_PUBLISH_ADDR:-127.0.0.1}:${REND_EDGE_PUBLISH_PORT:-4100}:4100"
    volumes:
      - ${REND_EDGE_CACHE_VOLUME:-/var/lib/rend/edge-cache}:/var/lib/rend/edge-cache
      - ${REND_EDGE_TELEMETRY_SPOOL_VOLUME:-/var/spool/rend/edge-telemetry}:/var/spool/rend/edge-telemetry
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4100/readyz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
